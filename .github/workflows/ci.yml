name: CI

# Phase 0 safety net: every PR and every push to a protected branch must keep
# the release gate green. The release gate now runs each check against its own
# throwaway SQLite database, so it is deterministic and safe to require.
#
# lint and audit run as informational (non-blocking) steps: both have a known
# pre-existing baseline (browser-global lint false-positives in
# tools/qa-signoff-collab; transitive-dependency CVEs). They are surfaced here
# but must not block merges until those baselines are cleaned up separately.

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    name: Release gate (required)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release gate
        run: npm run check:release-gate

  lint:
    name: Lint (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        continue-on-error: true
        run: npm run lint

  audit:
    name: Dependency audit (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (production deps)
        continue-on-error: true
        run: npm run audit
