<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solpranos Dashboard</title>
  <link rel="stylesheet" href="/portal-style.css">
  <style>
    /* Dashboard-specific extensions */
    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--space-6);
    }

    .user-header {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
      padding: var(--space-5);
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-default);
    }

    .user-avatar {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-full);
      border: 3px solid var(--gold);
    }

    .user-name {
      font-size: var(--font-2xl);
      font-weight: bold;
      color: var(--text-primary);
      margin: 0;
    }

    .user-status {
      color: var(--text-secondary);
      font-size: var(--font-sm);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--space-4);
      margin-bottom: var(--space-6);
    }

    .stat-card {
      background: var(--bg-secondary);
      padding: var(--space-6);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-default);
      text-align: center;
      transition: var(--transition-base);
    }

    .stat-card:hover {
      border-color: var(--border-emphasis);
      box-shadow: var(--shadow-gold-sm);
      transform: translateY(-2px);
    }

    .stat-value {
      font-size: var(--font-4xl);
      color: var(--gold);
      font-weight: bold;
      display: block;
      margin-bottom: var(--space-2);
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: var(--font-sm);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .wallet-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .wallet-item {
      background: var(--bg-tertiary);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
      border-radius: var(--radius-md);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--space-3);
      border: 1px solid var(--border-subtle);
      transition: var(--transition-base);
    }

    .wallet-item:hover {
      border-color: var(--border-default);
      background: var(--bg-elevated);
    }

    .wallet-address {
      font-family: 'Monaco', 'Courier New', monospace;
      color: var(--gold);
      word-break: break-all;
      flex: 1;
      font-size: var(--font-sm);
    }

    .wallet-actions {
      display: flex;
      gap: var(--space-2);
    }

    .favorite-star {
      color: var(--gold);
      font-size: var(--font-xl);
      cursor: pointer;
      opacity: 0.3;
      transition: var(--transition-base);
    }

    .favorite-star:hover {
      opacity: 0.6;
    }

    .favorite-star.active {
      opacity: 1;
    }

    .proposal-item,
    .mission-item {
      background: var(--bg-tertiary);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      transition: var(--transition-base);
    }

    .proposal-item:hover,
    .mission-item:hover {
      border-color: var(--border-default);
      background: var(--bg-elevated);
    }

    .proposal-title,
    .mission-title {
      color: var(--gold);
      font-size: var(--font-lg);
      font-weight: 600;
      margin-bottom: var(--space-2);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .proposal-meta,
    .mission-meta {
      color: var(--text-secondary);
      font-size: var(--font-sm);
    }

    .status-badge {
      display: inline-block;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--font-xs);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-voting {
      background: var(--success-bg);
      color: var(--success);
    }

    .status-draft {
      background: var(--warning-bg);
      color: var(--warning);
    }

    .status-recruiting {
      background: var(--info-bg);
      color: var(--info);
    }

    .status-active {
      background: var(--success-bg);
      color: var(--success);
    }

    .login-prompt {
      text-align: center;
      padding: var(--space-12);
    }

    .login-prompt h2 {
      color: var(--gold);
      font-size: var(--font-3xl);
      margin-bottom: var(--space-4);
    }

    .login-prompt p {
      color: var(--text-secondary);
      margin-bottom: var(--space-6);
      font-size: var(--font-lg);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: var(--space-8);
      font-size: var(--font-base);
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .wallet-actions {
        width: 100%;
      }

      .user-header {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <!-- Top Navigation -->
  <nav class="top-nav" role="navigation" aria-label="Dashboard navigation">
    <div class="nav-brand">
      <h1>🎩 Solpranos Dashboard</h1>
    </div>
    <div class="nav-user">
      <button class="btn-secondary" onclick="window.location.href='/'" style="margin-right: 10px;">Home</button>
      <button class="btn-secondary" onclick="window.location.href='/verify'" style="margin-right: 10px;">Verify Wallet</button>
      <button id="logoutBtn" class="btn-secondary" style="display:none;" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dashboard-container">
    <div id="loginPrompt" class="card login-prompt" style="display:none;">
      <h2>Welcome to Solpranos Dashboard</h2>
      <p>Login with Discord to view your profile, manage wallets, and track your governance participation.</p>
      <button class="btn-primary" onclick="login()">🎮 Login with Discord</button>
    </div>

    <div id="dashboardContent" style="display:none;">
      <div class="user-header">
        <img id="userAvatar" class="user-avatar" src="" alt="User avatar">
        <div>
          <h2 class="user-name" id="userName"></h2>
          <p class="user-status">Logged in</p>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-value" id="tierStat">-</span>
          <span class="stat-label">Tier</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="vpStat">0</span>
          <span class="stat-label">Voting Power</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="nftsStat">0</span>
          <span class="stat-label">NFTs</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="pointsStat">0</span>
          <span class="stat-label">Heist Points</span>
        </div>
      </div>

      <div class="card">
        <h2 class="card-title">💼 My Wallets</h2>
        <ul id="walletList" class="wallet-list"></ul>
        <button class="btn-primary" onclick="window.location.href='/verify'">➕ Add Wallet</button>
      </div>

      <div class="card">
        <h2 class="card-title">📜 My Proposals</h2>
        <div id="proposalList"></div>
      </div>

      <div class="card">
        <h2 class="card-title">🎯 My Missions</h2>
        <div id="missionList"></div>
      </div>
    </div>
  </div>

  <script>
    let userData = null;

    async function loadDashboard() {
      try {
        const response = await fetch('/api/user/me');
        const data = await response.json();

        if (data.success) {
          userData = data;
          showDashboard();
        } else {
          showLoginPrompt();
        }
      } catch (error) {
        console.error('Error loading dashboard:', error);
        showLoginPrompt();
      }
    }

    function showLoginPrompt() {
      document.getElementById('loginPrompt').style.display = 'block';
      document.getElementById('dashboardContent').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('loginPrompt').style.display = 'none';
      document.getElementById('dashboardContent').style.display = 'block';
      document.getElementById('logoutBtn').style.display = 'inline-block';

      // User info
      const avatarUrl = userData.user.avatar 
        ? `https://cdn.discordapp.com/avatars/${userData.user.discordId}/${userData.user.avatar}.png`
        : 'https://cdn.discordapp.com/embed/avatars/0.png';
      
      document.getElementById('userAvatar').src = avatarUrl;
      document.getElementById('userName').textContent = userData.user.username;

      // Stats
      document.getElementById('tierStat').textContent = userData.user.tier || 'None';
      document.getElementById('vpStat').textContent = userData.user.votingPower;
      document.getElementById('nftsStat').textContent = userData.user.totalNFTs;
      document.getElementById('pointsStat').textContent = userData.user.totalPoints;

      // Wallets
      renderWallets();

      // Proposals
      renderProposals();

      // Missions
      renderMissions();
    }

    function renderWallets() {
      const list = document.getElementById('walletList');
      list.innerHTML = '';

      if (userData.wallets.length === 0) {
        list.innerHTML = '<div class="empty-state">No wallets linked. Click "Add Wallet" to get started.</div>';
        return;
      }

      userData.wallets.forEach(wallet => {
        const li = document.createElement('li');
        li.className = 'wallet-item';
        li.innerHTML = `
          <div style="display: flex; align-items: center; gap: var(--space-3); flex: 1;">
            <span class="favorite-star ${wallet.is_favorite ? 'active' : ''}" 
                  onclick="toggleFavorite('${wallet.wallet_address}')"
                  title="Set as favorite">⭐</span>
            <span class="wallet-address">${wallet.wallet_address}</span>
          </div>
          <div class="wallet-actions">
            <button class="btn-danger btn-sm" onclick="removeWallet('${wallet.wallet_address}')">Remove</button>
          </div>
        `;
        list.appendChild(li);
      });
    }

    async function toggleFavorite(address) {
      try {
        const response = await fetch(`/api/user/wallets/${address}/favorite`, {
          method: 'POST'
        });
        const data = await response.json();

        if (data.success) {
          await loadDashboard();
        } else {
          alert(data.message);
        }
      } catch (error) {
        console.error('Error setting favorite:', error);
        alert('Failed to set favorite wallet');
      }
    }

    async function removeWallet(address) {
      if (!confirm('Are you sure you want to remove this wallet?')) {
        return;
      }

      try {
        const response = await fetch(`/api/user/wallets/${address}`, {
          method: 'DELETE'
        });
        const data = await response.json();

        if (data.success) {
          await loadDashboard();
        } else {
          alert(data.message);
        }
      } catch (error) {
        console.error('Error removing wallet:', error);
        alert('Failed to remove wallet');
      }
    }

    function renderProposals() {
      const list = document.getElementById('proposalList');
      list.innerHTML = '';

      if (userData.proposals.length === 0) {
        list.innerHTML = '<div class="empty-state">No active proposals created by you.</div>';
        return;
      }

      userData.proposals.forEach(proposal => {
        const div = document.createElement('div');
        div.className = 'proposal-item';
        div.innerHTML = `
          <div class="proposal-title">
            ${proposal.title}
            <span class="status-badge status-${proposal.status}">${proposal.status.toUpperCase()}</span>
          </div>
          <div class="proposal-meta">
            ${proposal.proposal_id} • Created ${new Date(proposal.created_at).toLocaleDateString()}
          </div>
        `;
        list.appendChild(div);
      });
    }

    function renderMissions() {
      const list = document.getElementById('missionList');
      list.innerHTML = '';

      if (userData.missions.length === 0) {
        list.innerHTML = '<div class="empty-state">No active missions joined.</div>';
        return;
      }

      userData.missions.forEach(mission => {
        const div = document.createElement('div');
        div.className = 'mission-item';
        div.innerHTML = `
          <div class="mission-title">
            ${mission.title}
            <span class="status-badge status-${mission.status}">${mission.status.toUpperCase()}</span>
          </div>
          <div class="mission-meta">
            ${mission.mission_id} • Role: ${mission.assigned_role} • NFT: ${mission.assigned_nft_name || 'N/A'}
            ${mission.points_awarded > 0 ? ` • Earned: ${mission.points_awarded} pts` : ''}
          </div>
        `;
        list.appendChild(div);
      });
    }

    function login() {
      window.location.href = '/auth/discord/login';
    }

    function logout() {
      window.location.href = '/auth/discord/logout';
    }

    // Load on page load
    loadDashboard();
  </script>
</body>
</html>
