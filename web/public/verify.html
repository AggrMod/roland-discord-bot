<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solpranos - Wallet Verification</title>
  <link rel="stylesheet" href="/portal-style.css">
  <style>
    /* Verify page specific extensions */
    .verify-container {
      max-width: 800px;
      margin: 0 auto;
      padding: var(--space-6);
    }

    .header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .header h1 {
      color: var(--gold);
      font-size: var(--font-4xl);
      margin-bottom: var(--space-2);
      text-shadow: 0 0 20px var(--gold-glow);
    }

    .header h2 {
      color: var(--text-secondary);
      font-size: var(--font-xl);
      font-weight: 400;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-default);
      margin-bottom: var(--space-6);
    }

    .user-info .avatar {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-full);
      border: 2px solid var(--gold);
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step h3 {
      color: var(--gold);
      font-size: var(--font-2xl);
      margin-bottom: var(--space-4);
      text-align: center;
    }

    .hint {
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: var(--space-6);
      font-size: var(--font-base);
      line-height: 1.6;
    }

    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-8);
      gap: var(--space-4);
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--bg-tertiary);
      border-top-color: var(--gold);
      border-radius: var(--radius-full);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading p {
      color: var(--text-secondary);
      font-size: var(--font-lg);
    }

    .wallets-header h4 {
      color: var(--gold);
      font-size: var(--font-lg);
      margin-bottom: var(--space-3);
    }

    .wallets-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .wallet-item {
      background: var(--bg-tertiary);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: var(--transition-base);
    }

    .wallet-item:hover {
      border-color: var(--border-default);
      background: var(--bg-elevated);
    }

    .wallet-item.favorite {
      border-color: var(--gold);
      background: rgba(255, 215, 0, 0.05);
    }

    .wallet-address {
      font-family: 'Monaco', 'Courier New', monospace;
      color: var(--text-primary);
      font-size: var(--font-sm);
    }

    .star-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: var(--font-xl);
      cursor: pointer;
      padding: var(--space-1);
      transition: var(--transition-base);
    }

    .star-btn:hover {
      color: var(--gold);
      transform: scale(1.2);
    }

    .star-btn.active {
      color: var(--gold);
    }

    .link-btn {
      display: inline-block;
      margin-top: var(--space-4);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: var(--font-sm);
      transition: var(--transition-base);
    }

    .link-btn:hover {
      color: var(--gold);
    }

    .success {
      color: var(--success);
      text-align: center;
      margin-bottom: var(--space-4);
      font-size: var(--font-lg);
    }

    .button-center {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      margin-top: var(--space-4);
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <!-- Top Navigation -->
  <nav class="top-nav" role="navigation" aria-label="Verification navigation">
    <div class="nav-brand">
      <h1>🎩 Solpranos</h1>
    </div>
    <div class="nav-user">
      <button class="btn-secondary" onclick="window.location.href='/dashboard'">Dashboard</button>
    </div>
  </nav>

  <div class="verify-container">
    <div class="header">
      <h1>🎩 Solpranos</h1>
      <h2>Wallet Verification</h2>
    </div>

    <div id="userInfo" class="user-info" style="display:none;">
      <img id="userAvatar" class="avatar" />
      <span id="userName"></span>
    </div>

    <div class="card">
      <div id="step-connect" class="step active">
        <h3>Connect Your Wallet</h3>
        <p class="hint">Click the button below to connect your Phantom or Solflare wallet and verify ownership.</p>
        <div class="button-center">
          <button class="btn-primary" onclick="connectWallet()">🔗 Connect Wallet</button>
        </div>
        <div id="walletsList"></div>
        <div class="button-center">
          <a href="/dashboard" class="link-btn">← Back to Dashboard</a>
        </div>
      </div>

      <div id="step-success" class="step">
        <h3>✅ Wallet Verified!</h3>
        <p id="successMessage" class="success"></p>
        <div id="walletsListSuccess"></div>
        <div class="button-center">
          <button class="btn-primary" onclick="connectAnother()">Add Another Wallet</button>
        </div>
        <div class="button-center">
          <a href="/dashboard" class="link-btn">← Back to Dashboard</a>
        </div>
      </div>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Processing...</p>
      </div>

      <div id="error" class="alert alert-error" style="display:none; margin-top: var(--space-4);"></div>
    </div>
  </div>

  <script>
    let discordUser = null;

    // Load user info from session on page load
    async function init() {
      try {
        const res = await fetch('/api/user/me');
        const data = await res.json();
        
        if (!data.success && res.status === 401) {
          // Not logged in — redirect to OAuth
          window.location.href = '/auth/discord/login';
          return;
        }

        discordUser = data.user || data;
        
        // Show user info
        const userInfoEl = document.getElementById('userInfo');
        const avatarEl = document.getElementById('userAvatar');
        const nameEl = document.getElementById('userName');
        
        if (discordUser.discordId || discordUser.discord_id) {
          const id = discordUser.discordId || discordUser.discord_id;
          const username = discordUser.username || 'User';
          const avatar = discordUser.avatar;
          
          if (avatar) {
            avatarEl.src = `https://cdn.discordapp.com/avatars/${id}/${avatar}.png?size=64`;
          } else {
            avatarEl.src = `https://cdn.discordapp.com/embed/avatars/0.png`;
          }
          nameEl.textContent = username;
          userInfoEl.style.display = 'flex';
        }

        // Load existing wallets
        await loadWallets();
      } catch (err) {
        console.error('Init error:', err);
        window.location.href = '/auth/discord/login';
      }
    }

    function showStep(stepId) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(stepId).classList.add('active');
      document.getElementById('error').style.display = 'none';
    }

    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }

    function showError(message) {
      const errorEl = document.getElementById('error');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
      setTimeout(() => { errorEl.style.display = 'none'; }, 5000);
    }

    function getDiscordId() {
      return discordUser?.discordId || discordUser?.discord_id || discordUser?.id;
    }

    async function connectWallet() {
      try {
        const provider = window.solana || window.phantom?.solana;
        
        if (!provider) {
          showError('Please install Phantom or Solflare wallet extension');
          return;
        }

        showLoading(true);

        const response = await provider.connect();
        const publicKey = response.publicKey.toString();
        const discordId = getDiscordId();

        // Create and sign message
        const timestamp = Date.now();
        const message = `Verify wallet ownership for Solpranos: ${discordId}:${timestamp}`;
        const encodedMessage = new TextEncoder().encode(message);
        const signedMessage = await provider.signMessage(encodedMessage, 'utf8');
        const signatureBase58 = bs58Encode(signedMessage.signature);

        // Send to server
        const verifyResponse = await fetch('/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            discordId: discordId,
            walletAddress: publicKey,
            signature: signatureBase58,
            message: message
          })
        });

        const result = await verifyResponse.json();
        showLoading(false);

        if (result.success) {
          document.getElementById('successMessage').textContent = 
            `Wallet ${publicKey.slice(0, 6)}...${publicKey.slice(-4)} successfully linked!`;
          await loadWallets('walletsListSuccess');
          showStep('step-success');
        } else {
          showError(result.message || 'Verification failed');
        }
      } catch (error) {
        showLoading(false);
        console.error('Wallet connection error:', error);
        showError(error.message || 'Failed to connect wallet');
      }
    }

    async function loadWallets(targetId) {
      try {
        const discordId = getDiscordId();
        if (!discordId) return;

        const response = await fetch(`/api/wallets/${discordId}`);
        const result = await response.json();

        if (result.success && result.wallets.length > 0) {
          displayWallets(result.wallets, targetId || 'walletsList');
        }
      } catch (error) {
        console.error('Error loading wallets:', error);
      }
    }

    function displayWallets(wallets, targetId) {
      const listEl = document.getElementById(targetId);
      if (!wallets.length) { listEl.innerHTML = ''; return; }

      listEl.innerHTML = `
        <div class="wallets-header"><h4>Your Linked Wallets</h4></div>
        <div class="wallets-list">
          ${wallets.map(w => `
            <div class="wallet-item ${w.is_favorite ? 'favorite' : ''}">
              <span class="wallet-address">${w.wallet_address.slice(0, 6)}...${w.wallet_address.slice(-4)}</span>
              <button class="star-btn ${w.is_favorite ? 'active' : ''}" 
                onclick="setFavorite('${w.wallet_address}')"
                title="${w.is_favorite ? 'Favorite wallet' : 'Set as favorite'}">
                ${w.is_favorite ? '⭐' : '☆'}
              </button>
            </div>
          `).join('')}
        </div>`;
    }

    async function setFavorite(walletAddress) {
      try {
        showLoading(true);
        const discordId = getDiscordId();
        const res = await fetch(`/api/wallets/${discordId}/favorite`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ walletAddress })
        });
        const result = await res.json();
        showLoading(false);
        if (result.success) { await loadWallets(); }
        else { showError(result.message || 'Failed to set favorite'); }
      } catch (error) {
        showLoading(false);
        showError('Failed to set favorite wallet');
      }
    }

    function connectAnother() {
      showStep('step-connect');
      loadWallets();
    }

    // Base58 encoding
    function bs58Encode(buffer) {
      const ALPHABET = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
      const base = ALPHABET.length;
      let encoded = '';
      let num = BigInt('0x' + Array.from(buffer).map(b => b.toString(16).padStart(2, '0')).join(''));
      while (num > 0n) {
        const remainder = num % BigInt(base);
        num = num / BigInt(base);
        encoded = ALPHABET[Number(remainder)] + encoded;
      }
      for (let i = 0; i < buffer.length && buffer[i] === 0; i++) {
        encoded = ALPHABET[0] + encoded;
      }
      return encoded;
    }

    // Initialize on load
    init();
  </script>
</body>
</html>
